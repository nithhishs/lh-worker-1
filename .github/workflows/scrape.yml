# GitHub Actions - 250 batches, 20 parallel per batch
# Place this at: .github/workflows/test-my-site.yml
# .github/workflows/scrape.yml
# ─────────────────────────────────────────────────────────────────
# This workflow is triggered by your Oracle orchestrator via API.
# Each run gets a FRESH Microsoft Azure IP → LinkedIn can't ban it.
#
# SETUP for each GitHub account:
#   1. Create a new PUBLIC repo named e.g. "lh-worker-1"
#   2. Add this file at: .github/workflows/scrape.yml
#   3. Add worker_scraper.py to root of repo
#   4. Add requirements.txt to root of repo
#   5. Add these SECRETS in repo Settings → Secrets → Actions:
#        ORACLE_URL       = http://YOUR_ORACLE_IP:8765/receive
#        RECEIVER_SECRET  = your_shared_secret
# ─────────────────────────────────────────────────────────────────

name: LinkedIn Job Scraper

on:
  # Triggered by Oracle orchestrator via GitHub API
  workflow_dispatch:
    inputs:
      keyword:
        description: "Job keyword to search"
        required: true
        default: "Software Developer"
      location:
        description: "Location to search"
        required: true
        default: "India"
      date_filter:
        description: "Date filter (r86400=24h, r604800=1week)"
        required: false
        default: "r86400"
      jobs_per_run:
        description: "Max jobs to collect (use 15-25 to finish within timeout)"
        required: false
        default: "20"
      total_batches:
        description: "Total matrix shards to run (e.g. 250)"
        required: false
        default: "250"
      max_parallel:
        description: "How many shards run at once (e.g. 20)"
        required: false
        default: "20"

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Build shard matrix
        id: build
        shell: bash
        run: |
          set -euo pipefail
          python - << 'PY'
          import json
          import os

          total = int(os.environ.get("TOTAL_BATCHES", "250"))
          if total < 1:
              total = 1
          if total > 500:
              total = 500

          matrix = {"batch": list(range(1, total + 1))}
          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as f:
              f.write("matrix=" + json.dumps(matrix) + "\n")
          PY
        env:
          TOTAL_BATCHES: ${{ github.event.inputs.total_batches || '250' }}

  scrape:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(github.event.inputs.max_parallel || '20') }}
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show shard info
        run: |
          echo "batch=${{ matrix.batch }}"
          echo "run_id=${{ github.run_id }}"
          echo "runner=${{ runner.name }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml feedparser

      - name: Run scraper
        env:
          ORACLE_URL:             ${{ secrets.ORACLE_URL }}
          RECEIVER_SECRET:        ${{ secrets.RECEIVER_SECRET }}
          KEYWORD:                ${{ github.event.inputs.keyword }}
          LOCATION:               ${{ github.event.inputs.location }}
          DATE_FILTER:            ${{ github.event.inputs.date_filter }}
          JOBS_PER_RUN:           ${{ github.event.inputs.jobs_per_run }}
          STRATEGY:               "single"
          SKIP_COMPANY_DETAILS:   "1"
          GITHUB_USER:            ${{ github.repository_owner }}
          BATCH_ID:               ${{ matrix.batch }}
        run: python worker_scraper.py

      - name: Upload fallback if Oracle unreachable
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-fallback-${{ github.run_id }}-${{ matrix.batch }}
          path: jobs_fallback.json
          if-no-files-found: ignore
          retention-days: 1
